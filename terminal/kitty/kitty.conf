###############################################################
#                      Kitty Configuration                    #
#                  Tema: Tokyo Night (Dark)                   #
###############################################################

# ---------------- Fuente ----------------
font_family      JetBrains Mono
font_size        12.5

# ---------------- Tabs ----------------
map alt+right next_tab
map alt+left previous_tab
map alt+shift+right move_tab_forward
map alt+shift+left move_tab_backward
map alt+t set_tab_title " "
map alt+r set_tab_title ""
map ctrl+alt+t new_tab_with_cwd
map ctrl+shift+enter launch --location=hsplit --cwd=current
map ctrl+alt+enter launch --location=vsplit --cwd=current
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right
map ctrl+shift+h resize_window narrower 3
map ctrl+shift+j resize_window shorter 3
map ctrl+shift+k resize_window taller 3
map ctrl+shift+l resize_window wider 3
map ctrl+w close_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# ---------------- Cursor ----------------
cursor           #c0caf5
cursor_shape     underline  
cursor_blink     true
cursor_trail     16
cursor_trail_decay 0.002 0.04
cursor_trail_start_threshold 0

# ---------------- Terminal ----------------
shell /usr/bin/zsh
allow_remote_control yes

# Tamaño inicial (columnas × filas)
initial_window_width  100c
initial_window_height 30c

# Márgenes
margin_width  20
margin_height 20

###############################################################
#                          Fondo                              #
###############################################################

# Fondo base oscuro (Tokyo Night Night)
background #1a1b26
background_opacity 0.71

# Imagen de fondo opcional (si la quieres mantener)
#background_image /home/sandia/Imagenes/wallpapers/blood-moon.png
#background_image_layout centered
#background_image_linear 0.01 # Opacidad de la imagen

###############################################################
#                    Esquema de Colores                       #
#                  Tema: Tokyo Night (Dark)                   #
###############################################################

foreground            #c0caf5
selection_foreground  #c0caf5
selection_background  #283457
cursor                #c0caf5
cursor_text_color     #1a1b26
url_color             #7dcfff

# Bordes y tabs
active_border_color      #d8b4fe
inactive_border_color    #31244f
active_tab_foreground    #f5e9ff
active_tab_background    #9333ea
inactive_tab_foreground  #c4b5fd
inactive_tab_background  #221734
tab_bar_background       #0f0b18
tab_bar_style            powerline
tab_bar_margin_height    0.0 0.0
tab_separator            ""
tab_title_template       " {title[:18]} "
active_tab_title_template "  {title[:18]}  "

# Colores normales
color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6

# Colores brillantes
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# Generated theme overrides
include current-theme.conf
