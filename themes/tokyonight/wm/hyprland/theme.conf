# Theme metadata used by the selector and runtime theme file.
THEME_SLUG="tokyonight"
THEME_NAME="Tokyo Night"
THEME_DESCRIPTION="Tema actual base para todo el escritorio"

# Wallpaper and lockscreen assets.
THEME_WALLPAPER="$HOME/Imagenes/Wallpapers/tokyo.jpg"
THEME_HYPRLOCK_WALLPAPER="$HOME/Imagenes/Wallpapers/gachakuta"

# Colors exported to hyprlock through the generated runtime include.
THEME_HYPR_ACTIVE_BORDER="0xffcba6f7"
THEME_HYPR_INACTIVE_BORDER="0xff313244"

THEME_HYPRLOCK_FONT_COLOR="rgb(205, 214, 244)"
THEME_HYPRLOCK_CHECK_COLOR="rgb(108, 112, 134)"
THEME_HYPRLOCK_FAIL_COLOR="rgb(243, 139, 168)"
THEME_HYPRLOCK_TEXT_PRIMARY="rgb(205, 214, 244)"
THEME_HYPRLOCK_ACCENT="rgb(187, 154, 247)"
THEME_HYPRLOCK_TITLE="rgb(244, 239, 255)"
THEME_HYPRLOCK_SUBTITLE="rgb(166, 173, 200)"

# Per-app source files that are copied into runtime locations when the theme is applied.
THEME_KITTY_FILE="$HOME/TOOLS/MIS-DOTFILES/themes/tokyonight/terminal/kitty/kitty.conf"
THEME_EWW_FILE="$HOME/TOOLS/MIS-DOTFILES/themes/tokyonight/wm/eww/eww.scss"
THEME_EWW_YUCK_FILE="$HOME/TOOLS/MIS-DOTFILES/themes/tokyonight/wm/eww/eww.yuck"
THEME_ROFI_FILE="$HOME/.config/rofi/themes/tokyonight.rasi"
THEME_STARSHIP_FILE="$HOME/TOOLS/MIS-DOTFILES/themes/tokyonight/tools/starship/starship.toml"

# Tokyo keeps the default horizontal Eww layout.
THEME_EWW_BAR_ORIENTATION="h"
THEME_EWW_BAR_CLASS=""
