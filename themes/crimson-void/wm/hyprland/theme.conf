# Theme metadata used by the selector and runtime theme file.
THEME_SLUG="crimson-void"
THEME_NAME="Crimson Void"
THEME_DESCRIPTION="Base clonada para construir el tema crimson-void"

# Wallpaper and lockscreen assets.
THEME_WALLPAPER="$HOME/Imagenes/Wallpapers/jsk.mp4"
THEME_HYPRLOCK_WALLPAPER="$HOME/Imagenes/Wallpapers/gachakuta"

# Colors exported to hyprlock through the generated runtime include.
THEME_HYPR_ACTIVE_BORDER="0xffd46a32"
THEME_HYPR_INACTIVE_BORDER="0xff34150f"

THEME_HYPRLOCK_FONT_COLOR="rgb(205, 214, 244)"
THEME_HYPRLOCK_CHECK_COLOR="rgb(108, 112, 134)"
THEME_HYPRLOCK_FAIL_COLOR="rgb(243, 139, 168)"
THEME_HYPRLOCK_TEXT_PRIMARY="rgb(205, 214, 244)"
THEME_HYPRLOCK_ACCENT="rgb(187, 154, 247)"
THEME_HYPRLOCK_TITLE="rgb(244, 239, 255)"
THEME_HYPRLOCK_SUBTITLE="rgb(166, 173, 200)"

# Per-app source files that are copied into runtime locations when the theme is applied.
THEME_KITTY_FILE="$HOME/TOOLS/MIS-DOTFILES/themes/crimson-void/terminal/kitty/kitty.conf"
THEME_EWW_FILE="$HOME/TOOLS/MIS-DOTFILES/themes/crimson-void/wm/eww/eww.scss"
THEME_EWW_YUCK_FILE="$HOME/TOOLS/MIS-DOTFILES/themes/crimson-void/wm/eww/eww.yuck"
THEME_ROFI_FILE="$HOME/TOOLS/MIS-DOTFILES/themes/crimson-void/tools/rofi/crimson-void.rasi"
THEME_STARSHIP_FILE="$HOME/TOOLS/MIS-DOTFILES/themes/crimson-void/tools/starship/starship.toml"

# Crimson overrides the layout and turns Eww into a left vertical bar.
THEME_EWW_BAR_ORIENTATION="v"
THEME_EWW_BAR_CLASS="bar-vertical"
THEME_EWW_SECTION_ORIENTATION="v"
THEME_EWW_CENTER_ORIENTATION="v"
THEME_EWW_METRICS_ORIENTATION="v"
THEME_EWW_WORKSPACES_ORIENTATION="v"
THEME_EWW_SHOW_NOW_PLAYING="false"
THEME_EWW_SHOW_TIME_DATE="false"
THEME_EWW_METRICS_SHOW_SEPARATORS="false"
